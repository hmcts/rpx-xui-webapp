<div class="govuk-form-group" [ngClass]="{ 'govuk-form-group--error': !emailControl.valid }">
  <label class="govuk-label" [for]="id()">
    <span class="govuk-!-font-weight-bold" questionField.question_text>{{
      questionField.question_text | rpxTranslate
    }}</span>
    <span class="govuk-error-message" *ngIf="emailControl.errors && emailControl.touched">{{
      emailControl.errors | nocError | rpxTranslate
    }}</span>
  </label>

  <input class="govuk-input govuk-input--width-10" [id]="id()" type="email" [formControl]="emailControl" />
</div>
