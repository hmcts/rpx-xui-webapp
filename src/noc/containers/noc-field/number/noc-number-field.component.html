<div class="govuk-form-group" [ngClass]="{ 'govuk-form-group--error': !numberControl.valid }">
  <label class="govuk-label" [for]="id()">
    <span class="govuk-!-font-weight-bold" *ngIf="questionField.question_text">{{
      questionField.question_text | rpxTranslate
    }}</span>
    <span class="govuk-error-message" *ngIf="numberControl.errors && numberControl.touched">{{
      numberControl.errors | nocError | rpxTranslate
    }}</span>
  </label>

  <input class="govuk-input govuk-input--width-10" [id]="id()" type="number" [formControl]="numberControl" />
</div>
