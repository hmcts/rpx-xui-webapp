<header class="govuk-header" role="banner">
  <div class="govuk-header__container govuk-width-container">
    <ng-container [ngSwitch]="logo">
      <!-- Judicial logo -->
      <ng-container *ngSwitchCase="'judicial'">
        <a href="#" class="govuk-header__link govuk-header__link--homepage">
          <img
            class="govuk-header__logo"
            alt="GOV.UK logo"
            src="/assets/images/govuk-crest-jcm.png"
            width="83"
            *ngIf="showItems"
          />
        </a>
        <span class="govuk-header__service-name" *ngIf="headerTitle?.name">
          <a [routerLink]="headerTitle?.url" [attr.aria-label]="headerTitle?.name | rpxTranslate">
            {{ headerTitle?.name | rpxTranslate }}
          </a>
        </span>
      </ng-container>
      <!-- MyHMCTS logo -->
      <ng-container *ngSwitchCase="'myhmcts'">
        <a href="#" class="govuk-header__link govuk-header__link--homepage">
          <span class="govuk-header__logotype">
            <span class="govuk-header__logotype-text">MyHMCTS</span>
          </span>
        </a>
        <span class="govuk-header__service-name" *ngIf="headerTitle?.name">
          <a [routerLink]="headerTitle?.url" [attr.aria-label]="headerTitle?.name | rpxTranslate">
            {{ headerTitle?.name | rpxTranslate }}
          </a>
        </span>
      </ng-container>
      <!-- Default logo -->
      <ng-container *ngSwitchDefault>
        <a href="#" class="govuk-header__link govuk-header__link--homepage" *ngIf="!headerTitle?.name">
          <span class="govuk-header__logotype">
            <span class="govuk-header__logotype-text">MyHMCTS</span>
          </span>
        </a>
        <span class="govuk-header__service-name" *ngIf="headerTitle?.name">
          <a [routerLink]="'/'" [attr.aria-label]="headerTitle?.name | rpxTranslate">
            {{ headerTitle?.name | rpxTranslate }}
          </a>
        </span>
      </ng-container>
    </ng-container>

    <nav class="govuk-header__navigation" *ngIf="navigation?.items?.length" [attr.aria-label]="navigation?.label | rpxTranslate">
      <ul class="govuk-header__navigation-list">
        <li *ngFor="let item of navigation?.items; let i = index" class="govuk-header__navigation-item">
          <a
            class="govuk-header__navigation-link"
            tabindex="0"
            (click)="onEmitEvent(i)"
            (keyup.enter)="onEmitEvent(i)"
            *ngIf="userValue"
            [routerLink]=""
          >
            {{ item.text | rpxTranslate }}
          </a>
        </li>
      </ul>
    </nav>
  </div>
</header>

<section *ngIf="showItems" class="govuk-service-navigation">
  <div class="govuk-width-container govuk-service-navigation__container">
    <nav class="govuk-service-navigation__nav" aria-label="Primary navigation">
      <ul class="govuk-service-navigation__list">
        <li
          class="govuk-service-navigation__item"
          [class.govuk-service-navigation__item--active]="item?.active"
          *ngFor="let item of leftItems | async"
        >
          <a
            class="govuk-service-navigation__link"
            (click)="onEmitSubMenu(item)"
            [attr.aria-current]="item?.active ? 'page' : null"
            [routerLink]="item?.href"
          >
            {{ item.text | rpxTranslate }}
          </a>
        </li>
        <li
          class="govuk-service-navigation__item"
          [class.govuk-service-navigation__item--active]="item?.active"
          *ngFor="let item of rightItems | async"
        >
          <a
            *ngIf="(isUserCaseManager$ | async) || !isGlobalSearchEnabled"
            class="govuk-service-navigation__link"
            [ngClass]="item.ngClass"
            (click)="onEmitSubMenu(item)"
            [attr.aria-current]="item.active ? 'page' : null"
            [routerLink]="item.href"
          >
            {{ item.text | rpxTranslate }}
          </a>
          <exui-case-reference-search-box
            *ngIf="!(isUserCaseManager$ | async) && isGlobalSearchEnabled"
            [item]="item"
            [decorate16DigitCaseReferenceSearchBoxInHeader]="decorate16DigitCaseReferenceSearchBoxInHeader"
          >
          </exui-case-reference-search-box>
        </li>
      </ul>
    </nav>
  </div>
</section>
