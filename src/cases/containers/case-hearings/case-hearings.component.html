<xuilib-loading-spinner *ngIf="showSpinner$ | async"></xuilib-loading-spinner>
<div class="govuk-tabs__panel">
  <div class="govuk-width-container" *ngIf="serverError">
    <div class="govuk-main-wrapper">
      <p class="govuk-body">{{ serverError.message }}</p>
      <span class="govuk-body align-left">
        <button type="button" (click)="reloadHearings()" id="reload-hearing-tab" class="govuk-link govuk-js-link">
          {{ 'Reload hearings tab' | rpxTranslate }}
        </button>
      </span>
    </div>
  </div>
  <ng-container
    *ngIf="{
      upcoming: upcomingHearings$ | async,
      pastAndCancelled: pastAndCancelledHearings$ | async,
      listed: listedHearings$ | async,
      currentCaseHearingsLoaded: currentCaseHearingsLoaded$ | async,
    } as data"
  >
    <br />
    <ng-container *ngIf="!serverError && !data.currentCaseHearingsLoaded">
      <div class="hearings-loading-message" aria-live="polite">
        <p class="govuk-body">Retrieving hearing data...</p>
      </div>
    </ng-container>
    <ng-container *ngIf="!serverError && data.currentCaseHearingsLoaded">
      <a
        *ngIf="hasRequestAction"
        href="#"
        role="button"
        draggable="false"
        class="govuk-button govuk-button--start"
        data-module="govuk-button"
        (click)="createHearingRequest(); $event.preventDefault()"
        style="padding-right: 10px; background-image: none"
      >
        {{ 'Request a hearing' | rpxTranslate }}
        <svg
          style="padding-left: 5px; vertical-align: middle"
          class="govuk-button__start-icon"
          xmlns="http://www.w3.org/2000/svg"
          width="17.5"
          height="19"
          viewBox="0 0 33 40"
          focusable="false"
        >
          <path fill="currentColor" d="M0 0h13l20 20-20 20H0l20-20z" />
        </svg>
      </a>
      <ng-container *ngIf="!isOgdRole">
        <exui-case-hearings-list
          [status]="upcomingStatus"
          [hearingStageOptions]="hearingStageOptions"
          [hearingList$]="upcomingHearings$"
          [caseId]="caseId"
          [jurisdictionId]="jurisdiction"
          [actions]="hearingsActions"
        >
        </exui-case-hearings-list>

        <exui-case-hearings-list
          [status]="pastAndCancelledStatus"
          [hearingStageOptions]="hearingStageOptions"
          [hearingList$]="pastAndCancelledHearings$"
          [caseId]="caseId"
          [jurisdictionId]="jurisdiction"
          [actions]="hearingsActions"
        >
        </exui-case-hearings-list>
      </ng-container>

      <ng-container *ngIf="isOgdRole">
        <exui-case-hearings-list
          [status]="upcomingStatus"
          [hearingStageOptions]="hearingStageOptions"
          [hearingList$]="listedHearings$"
          [caseId]="caseId"
          [jurisdictionId]="jurisdiction"
          [actions]="hearingsActions"
        >
        </exui-case-hearings-list>
      </ng-container>
    </ng-container>
  </ng-container>
</div>
