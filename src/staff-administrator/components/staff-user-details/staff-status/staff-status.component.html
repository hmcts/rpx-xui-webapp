<ng-container [ngSwitch]="status">
  <div *ngSwitchCase="'ACTIVE'">
    <strong class="govuk-tag govuk-tag--green"> ACTIVE </strong>
  </div>

  <div *ngSwitchCase="'SUSPENDED'">
    <strong class="govuk-tag govuk-tag--red"> SUSPENDED </strong>
  </div>

  <span *ngSwitchCase="'PENDING'">
    <strong class="govuk-tag govuk-tag--blue"> PENDING </strong>
  </span>
</ng-container>
