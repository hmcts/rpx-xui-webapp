<div class="govuk-form-group" [ngClass]="{ 'govuk-form-group--error': !phoneUkControl.valid }">
  <label class="govuk-label" [for]="id()">
    <span class="govuk-!-font-weight-bold" *ngIf="questionField.question_text">{{
      questionField.question_text | rpxTranslate
    }}</span>
    <span class="govuk-error-message" *ngIf="phoneUkControl.errors && phoneUkControl.touched">{{
      phoneUkControl.errors | nocError | rpxTranslate
    }}</span>
  </label>
  <input class="govuk-input govuk-input--width-10" [id]="id()" type="tel" [formControl]="phoneUkControl" />
</div>
