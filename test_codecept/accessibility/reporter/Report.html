<!doctype html>
<!--[if lt IE 7]>      <html class="no-js lt-ie9 lt-ie8 lt-ie7"> <![endif]-->
<!--[if IE 7]>         <html class="no-js lt-ie9 lt-ie8"> <![endif]-->
<!--[if IE 8]>         <html class="no-js lt-ie9"> <![endif]-->
<!--[if gt IE 8]><!-->
<html class="no-js">
  <!--<![endif]-->
  <head>
    <meta charset="utf-8" />
    <title>EXUI Web Accesibility Test Report</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./resources/css/all.css" />
    <style>
      pre {
        white-space: pre-wrap; /* css-3 */
        white-space: -moz-pre-wrap; /* Mozilla, since 1999 */
        white-space: -pre-wrap; /* Opera 4-6 */
        white-space: -o-pre-wrap; /* Opera 7 */
        word-wrap: break-word; /* Internet Explorer 5.5+ */
      }
      body {
        background-color: lightgray;
      }
      i {
        margin: 10px;
      }
      .stats {
        font-size: 24px;
      }

      .header {
        background-color: darkslategrey;
        border-bottom-style: solid;
        border-bottom-width: 5px;
        border-color: red;
        margin-bottom: 5px;
        color: white;
      }

      #reportHeaderTitle {
        font-size: 24px;
      }
      #reportHeaderAppName {
        font-size: 16px;
      }
      .header .titleText {
        display: inline-block;
        width: 60%;
        text-align: center;
      }

      .header .titleText > div {
        display: inline-block;
        /* width: 40%; */
        text-align: center;
      }

      .header .stats {
        display: inline-block;
        width: 30%;
      }

      .testResult {
        border-top-style: groove;
        border-top-width: 5px;
        background-color: white;
        margin: 0% 15%;
      }

      .testTitle {
        font-size: 24px;
        font-weight: bold;
        padding: 5px;
      }
      .testTitle.pass {
        color: green;
      }
      .testTitle.fail {
        color: red;
      }

      .a11yResult.show {
        display: block;
      }

      .resultTable,
      .a11yResult h4 {
        margin-left: 2%;
      }

      .issuesTable {
        margin-left: 4%;
        border-top-width: 5px;
        border-top-color: red;
        border-top-style: solid;
        margin-bottom: 2px;
      }

      .a11yResult.hide {
        display: none;
      }

      .toggleDetails {
        cursor: pointer;
      }

      table {
        border-collapse: collapse;
        margin: 2px;
      }
      .a11yResult table tr th,
      .a11yResult table tr td {
        padding: 2px;
        text-align: left;
        border-style: groove;
      }
      .a11yResult table tr th {
        background-color: lightgray;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="header">
        <div class="titleText">
          <div>
            <i class="fas fa-universal-access" style="font-size: 60px; color: white"> </i>
          </div>

          <div>
            <div id="reportHeaderTitle">Accessibility Test Report for Expert UI</div>
            <div id="reportHeaderAppName"></div>
          </div>
        </div>

        <div class="stats">
          <i class="fas fa-check-circle" style="font-size: 40px; color: lightgreen"></i><span id="passedCount"></span>
          <i class="fas fa-times-circle" style="font-size: 40px; color: red"></i><span id="failedCount"></span>
        </div>
      </div>
      <div id="testsContainer"></div>
    </div>
    <script src="./report_output.js"></script>

    <script>
      var data = replacejsoncontent;

      function escapeHtml(input) {
        if (input === null || input === undefined) {
          return '';
        }
        return String(input)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function renderIssue(issue) {
        return [
          '<table class="issuesTable">',
          '<tr><th>Issue code</th><td>' + escapeHtml(issue.code) + '</td></tr>',
          '<tr><th>Issue type</th><td>' + escapeHtml(issue.type) + '</td></tr>',
          '<tr><th>Runner</th><td>' + escapeHtml(issue.runner) + '</td></tr>',
          '<tr><th>Message</th><td>' + escapeHtml(issue.message) + '</td></tr>',
          '<tr><th>Selector</th><td>' + escapeHtml(issue.selector) + '</td></tr>',
          '<tr><th>Context</th><td><pre><code>' + escapeHtml(issue.context) + '</code></pre></td></tr>',
          '</table>',
        ].join('');
      }

      function renderScreenshot(screenshot, index) {
        return [
          '<div>---------------------- Attempt ' + (index + 1) + ' ----------------------</div>',
          '<img src="' + escapeHtml(screenshot) + '" alt="a11y test page" width="500" height="500" />',
        ].join('');
      }

      function renderTest(test, index) {
        var statusClass = test.status === 'passed' ? 'pass' : 'fail';
        var result = test.a11yResult || {};
        var issues = Array.isArray(result.issues) ? result.issues : [];
        var screenshots = Array.isArray(test.screenshots) ? test.screenshots : [];
        var steps = Array.isArray(result.steps) ? result.steps : [];

        var stepsHtml = steps
          .map(function (step) {
            return '<div><code>' + escapeHtml(step) + '</code></div>';
          })
          .join('');

        var issuesHtml = issues.map(renderIssue).join('');
        var screenshotsHtml = screenshots.map(renderScreenshot).join('');

        var errorHtml = test.status === 'failed' ? '<div><pre><code>' + escapeHtml(test.error) + '</code></pre></div>' : '';

        return [
          '<div class="testResult">',
          '<div class="testTitle ' +
            statusClass +
            ' toggleDetails" data-target="detail-' +
            index +
            '">' +
            escapeHtml(test.name) +
            '</div>',
          errorHtml,
          '<div class="a11yResult hide" id="detail-' + index + '">',
          '<div><h3>Test Steps</h3>' + stepsHtml + '</div>',
          '<table class="resultTable">',
          '<tr><th>Document title:</th><td>' + escapeHtml(result.documentTitle) + '</td></tr>',
          '<tr><th>Page URL:</th><td>' + escapeHtml(result.pageUrl) + '</td></tr>',
          '<tr><th>Total issues:</th><td>' + issues.length + '</td></tr>',
          '</table>',
          '<h4>Issues:</h4>',
          issuesHtml,
          screenshotsHtml,
          '</div>',
          '</div>',
        ].join('');
      }

      function renderReport() {
        var reportData = data || { appName: '', passed: 0, failed: 0, tests: [] };
        var tests = Array.isArray(reportData.tests) ? reportData.tests : [];

        document.getElementById('reportHeaderAppName').textContent = reportData.appName || '';
        document.getElementById('passedCount').textContent = reportData.passed || 0;
        document.getElementById('failedCount').textContent = reportData.failed || 0;

        var html = tests.map(renderTest).join('');
        var container = document.getElementById('testsContainer');
        container.innerHTML = html;

        container.addEventListener('click', function (event) {
          var header = event.target.closest('.toggleDetails');
          if (!header) {
            return;
          }

          var targetId = header.getAttribute('data-target');
          var detail = document.getElementById(targetId);
          if (!detail) {
            return;
          }

          var isHidden = detail.classList.contains('hide');
          detail.classList.toggle('hide', !isHidden);
          detail.classList.toggle('show', isHidden);
        });
      }

      renderReport();
    </script>
  </body>
</html>
